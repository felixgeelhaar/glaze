# nox configuration — the security/dependency gate that replaces dependabot.
# Schema reference: https://github.com/nox-hq/nox
#
# Only GENERATED or PROSE artifacts are excluded here. First-party source
# (packages/, apps/, scripts/, .github/) is scanned, and — importantly — so is
# pnpm-lock.yaml: nox builds the dependency graph from the lockfile (excluding
# it drops dependency scanning to zero, which would defeat the dependabot
# replacement). Findings the excludes below do NOT silence are surfaced by the
# report-only CI gate; nothing is hidden by blanket directory excludes.

scan:
  exclude:
    # TypeScript / bundler build output (turbo run build -> package dist dirs)
    # and Storybook static export. Generated, not committed (see .gitignore),
    # but excluded so a local `nox scan` after a build does not re-trip
    # secret/slopsquat heuristics on emitted/declaration/bundled files.
    # Classification: Acceptable Pattern (generated). Last reviewed: 2026-07-11
    - dist/
    - lib/
    - build/
    - storybook-static/
    # nox's own baseline/cache and scan output — finding fingerprints are
    # SHA-256 hex that re-trip the secret detector. Never scan the scanner.
    # Classification: Acceptable Pattern. Last reviewed: 2026-07-11
    - .nox/
    - findings.json
    - nox-results/
    - "*.sarif"
    # Markdown is prose. The entropy/secret rules can fire HIGH severity on
    # ordinary README/CHANGELOG lines in a fresh CI environment (long hex/
    # base64-looking strings in examples, release notes, etc.) — false
    # positives, no real secrets. Real secret patterns in code are still
    # caught. Literal + globs are all required: "*.md" matches root files,
    # "**/*.md" matches nested files (the "**/*.md" glob alone does NOT match
    # files at the repo root in nox's matcher).
    # Classification: False Positive (prose). Last reviewed: 2026-07-11
    - README.md
    - "*.md"
    - "**/*.md"

# NOTE: pnpm-lock.yaml is deliberately NOT excluded so dependency-vulnerability
# scanning stays active. If a first-party critical/high false positive ever
# surfaces there (or anywhere the excludes above do not cover), accept it
# explicitly with `nox baseline add <fingerprint>` + commit .nox/, never by
# excluding the whole lockfile or a first-party source directory.
